<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      (function () {
        var LOOP = 'ResizeObserver loop';

        function isLoopMessage(message) {
          return typeof message === 'string' && message.indexOf(LOOP) !== -1;
        }

        function dismissOverlay() {
          var hook = window.__REACT_ERROR_OVERLAY_GLOBAL_HOOK__;
          if (hook && typeof hook.dismissOverlay === 'function') {
            hook.dismissOverlay();
          }
          var overlay = document.getElementById('webpack-dev-server-client-overlay');
          if (overlay) overlay.remove();
          var overlayDiv = document.getElementById('webpack-dev-server-client-overlay-div');
          if (overlayDiv) overlayDiv.remove();
        }

        window.addEventListener(
          'error',
          function (event) {
            if (!isLoopMessage(event.message) && !isLoopMessage(event.error && event.error.message)) {
              return;
            }
            dismissOverlay();
            event.stopImmediatePropagation();
            event.preventDefault();
          },
          true,
        );

        if (typeof window.ResizeObserver !== 'undefined') {
          var OriginalResizeObserver = window.ResizeObserver;
          window.ResizeObserver = class extends OriginalResizeObserver {
            constructor(callback) {
              var rafId = 0;
              super(function (entries, observer) {
                if (rafId) cancelAnimationFrame(rafId);
                rafId = requestAnimationFrame(function () {
                  rafId = requestAnimationFrame(function () {
                    rafId = 0;
                    callback(entries, observer);
                  });
                });
              });
            }
          };
        }
      })();
    </script>
    <meta charset="utf-8" />
    <!-- Add Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Configure Tailwind with Roboto font -->
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- DayPilot Gantt Library -->
    <script src="%PUBLIC_URL%/daypilot-all.min.js"></script>

    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />

    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>React App</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

      If you open it directly in the browser, you will see an empty page.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>

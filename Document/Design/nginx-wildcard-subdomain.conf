# ============================================================
# Nginx – Wildcard subdomain for AppAI tenants
# Each tenant is reachable at <token>.appai.com
# The backend resolves the tenant from the Host header.
# ============================================================

server {
    listen 80;
    server_name *.appai.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name *.appai.com;

    # Wildcard certificate issued via Let's Encrypt (DNS-01 challenge)
    ssl_certificate     /etc/letsencrypt/live/appai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/appai.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Pass the original subdomain to the backend so it can resolve the tenant
    proxy_set_header  Host              $host;
    proxy_set_header  X-Real-IP         $remote_addr;
    proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header  X-Forwarded-Proto $scheme;

    # React SPA static assets
    location / {
        proxy_pass http://localhost:3000;
    }

    # ASP.NET Web API
    location /appai/ {
        proxy_pass http://localhost/appai/;
    }
}

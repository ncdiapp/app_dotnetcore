# ============================================================
# Nginx – Custom domain for a single AppAI tenant
# Replace TENANT_DOMAIN with the actual domain, e.g. app.acme.com
# Repeat this block for each custom-domain tenant.
# ============================================================

# Certbot auto-provision:
#   certbot --nginx -d TENANT_DOMAIN

server {
    listen 80;
    server_name TENANT_DOMAIN;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name TENANT_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/TENANT_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TENANT_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Forward the custom domain so the backend can resolve the tenant
    proxy_set_header  Host              $host;
    proxy_set_header  X-Real-IP         $remote_addr;
    proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header  X-Forwarded-Proto $scheme;

    location / {
        proxy_pass http://localhost:3000;
    }

    location /appai/ {
        proxy_pass http://localhost/appai/;
    }
}
